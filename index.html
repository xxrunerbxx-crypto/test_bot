<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <title>Mini App записи</title>
  <style>
    :root{
      --card-radius: 16px;
      --accent: #ff4d94;
      --accent2: #7c4dff;
    }
    body{
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(1200px 600px at 50% -10%, rgba(255,77,148,0.18), transparent 60%),
                  radial-gradient(800px 500px at 10% 20%, rgba(124,77,255,0.15), transparent 55%),
                  var(--tg-theme-bg-color);
      color: var(--tg-theme-text-color);
      margin: 0;
      padding: 16px;
      min-height: 100vh;
      box-sizing: border-box;
    }
    .wrap{ max-width: 560px; margin: 0 auto; }
    .header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    .brand{
      display:flex; flex-direction:column;
    }
    .brand b{ font-size: 16px; }
    .brand span{ opacity: 0.8; font-size: 12px; margin-top: 2px; }

    .card{
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: var(--card-radius);
      box-shadow: 0 10px 30px rgba(0,0,0,0.10);
      padding: 14px;
      margin-bottom: 12px;
      backdrop-filter: blur(8px);
    }

    .title{
      font-size: 18px;
      font-weight: 800;
      margin: 2px 0 10px;
    }
    .subtle{ opacity: 0.85; font-size: 13px; margin-top: -6px; }

    .row{ display:flex; gap: 10px; flex-wrap: wrap; }
    .col{ flex: 1 1 240px; }

    .field{
      display:flex;
      flex-direction:column;
      gap: 6px;
      margin-top: 10px;
    }
    label{ font-size: 12px; opacity: 0.9; }
    input, textarea{
      width: 100%;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.14);
      padding: 10px 12px;
      background: rgba(0,0,0,0.18);
      color: var(--tg-theme-text-color);
      outline: none;
      box-sizing: border-box;
    }
    textarea{ min-height: 94px; resize: vertical; }

    .btn{
      border: none;
      border-radius: 14px;
      padding: 12px 14px;
      font-weight: 800;
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      box-shadow: 0 10px 20px rgba(255,77,148,0.22);
      transition: transform 0.08s ease-in-out;
      width: 100%;
    }
    .btn:active{ transform: scale(0.99); }
    .btn-secondary{
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.16);
      box-shadow: none;
      font-weight: 800;
      color: var(--tg-theme-text-color);
    }

    .pill{
      border-radius: 999px;
      padding: 10px 12px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      cursor:pointer;
      user-select:none;
      font-weight: 800;
      transition: background 0.12s ease, transform 0.08s ease-in-out;
      text-align:center;
    }
    .pill:active{ transform: scale(0.99); }
    .pill[aria-selected="true"]{
      background: rgba(255,77,148,0.25);
      border-color: rgba(255,77,148,0.50);
    }

    .grid-3{ display:grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    @media (max-width: 440px){
      .grid-3{ grid-template-columns: repeat(2, 1fr); }
    }

    .hint{
      font-size: 12px;
      opacity: 0.85;
      margin-top: 8px;
      line-height: 1.35;
    }

    .muted{ opacity: 0.75; font-size: 12px; }
    .error{
      background: rgba(255,77,77,0.12);
      border: 1px solid rgba(255,77,77,0.25);
      padding: 10px 12px;
      border-radius: 14px;
      margin-top: 10px;
      white-space: pre-wrap;
    }
    .success{
      background: rgba(77,255,137,0.10);
      border: 1px solid rgba(77,255,137,0.25);
      padding: 10px 12px;
      border-radius: 14px;
      margin-top: 10px;
      white-space: pre-wrap;
    }
    .steps{
      display:flex; gap: 8px; flex-wrap:wrap;
      margin-bottom: 10px;
    }
    .step{
      font-size: 12px;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      opacity: 0.85;
      font-weight: 800;
    }
    .step.on{
      opacity: 1;
      background: rgba(255,77,148,0.20);
      border-color: rgba(255,77,148,0.40);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div class="brand">
        <b>Запись к мастеру</b>
        <span id="subTitle">TG Mini App</span>
      </div>
      <div class="muted" id="accessBadge"></div>
    </div>

    <div class="card" id="clientCard" style="display:none;">
      <div class="steps">
        <div class="step on" id="s1">1. Услуги</div>
        <div class="step" id="s2">2. Дата</div>
        <div class="step" id="s3">3. Время</div>
        <div class="step" id="s4">4. Контакты</div>
      </div>

      <div class="title" id="clientTitle">Запись</div>
      <div class="subtle" id="clientServices">—</div>

      <div id="clientError" class="error" style="display:none;"></div>
      <div id="clientOk" class="success" style="display:none;"></div>

      <!-- Step 2: Date -->
      <div class="field" id="dateField">
        <label>Выберите дату</label>
        <input type="date" id="dateInput" />
      </div>

      <!-- Step 3: Slots -->
      <div class="field" id="slotsField" style="display:none;">
        <label>Доступное время</label>
        <div class="grid-3" id="slotsGrid"></div>
        <div class="hint">Если слоты не появились — попробуйте другую дату.</div>
      </div>

      <!-- Step 4: Contact -->
      <div id="contactField" style="display:none;">
        <div class="field">
          <label>Имя и фамилия</label>
          <input id="nameInput" type="text" placeholder="Иван Иванов" />
        </div>
        <div class="field">
          <label>Телефон</label>
          <input id="phoneInput" type="tel" placeholder="+7 999 123-45-67" />
        </div>
        <div style="margin-top: 12px;">
          <button class="btn" id="bookBtn">Подтвердить запись</button>
          <button class="btn btn-secondary" id="cancelBtn" style="margin-top:10px;">Отменить мою запись</button>
        </div>
      </div>
    </div>

    <div class="card" id="masterCard" style="display:none;">
      <div class="title" id="masterTitle">Панель мастера</div>
      <div class="subtle" id="masterSub">—</div>
      <div id="masterError" class="error" style="display:none;"></div>
      <div id="masterOk" class="success" style="display:none;"></div>

      <div class="row">
        <div class="col">
          <div class="field">
            <label>Основные услуги</label>
            <textarea id="mainServices"></textarea>
          </div>
        </div>
        <div class="col">
          <div class="field">
            <label>Доп. услуги</label>
            <textarea id="additionalServices"></textarea>
          </div>
        </div>
      </div>
      <div class="field">
        <label>Гарантия</label>
        <textarea id="warranty"></textarea>
      </div>

      <div class="row">
        <div class="col">
          <div class="field">
            <label>Портфолио (ссылка)</label>
            <input id="portfolioLink" type="text" placeholder="https://..." />
          </div>
        </div>
        <div class="col" style="display:flex;align-items:flex-end;">
          <div>
            <button class="btn" id="saveServicesBtn">Сохранить</button>
          </div>
        </div>
      </div>

      <div class="row" style="margin-top: 14px;">
        <div class="col">
          <div class="field">
            <label>Слоты: дата</label>
            <input type="date" id="masterDateInput" />
          </div>
        </div>
      </div>

      <div class="row" style="margin-top: 10px;">
        <div class="col">
          <button class="btn btn-secondary" id="autoFillBtn">Авто (10:00-19:00)</button>
        </div>
        <div class="col">
          <button class="btn btn-secondary" id="clearDayBtn">Очистить день</button>
        </div>
      </div>

      <div class="field" style="margin-top: 12px;">
        <label>Слоты</label>
        <div id="masterSlotsList" class="hint">—</div>
      </div>

      <div class="field">
        <label>Статистика</label>
        <div id="masterStats" class="hint">—</div>
      </div>
    </div>
  </div>

  <script>
    const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
    if (!tg) {
      // Если открыть страницу не внутри Telegram WebView, Telegram API не появится и JS упадет.
      const card = document.getElementById("clientCard");
      const err = document.getElementById("clientError");
      if (card) card.style.display = "block";
      if (err) {
        err.style.display = "block";
        err.textContent = "Откройте мини-приложение внутри Telegram (не в обычном браузере).";
      }
    } else {
      tg.expand();
    }

    const params = new URLSearchParams(window.location.search);
    const role = params.get("role") || "client";
    const masterId = params.get("master_id");

    const API = "/api";

    const $ = (id) => document.getElementById(id);
    const show = (el) => el && (el.style.display = "block");
    const hide = (el) => el && (el.style.display = "none");

    function setError(el, msg){
      if(!el) return;
      el.textContent = msg;
      show(el);
    }
    function clearError(el){
      if(!el) return;
      hide(el);
      el.textContent = "";
    }
    function setOk(el, msg){
      if(!el) return;
      el.textContent = msg;
      show(el);
    }
    function clearOk(el){
      if(!el) return;
      hide(el);
      el.textContent = "";
    }

    function setStep(stepNum){
      ["s1","s2","s3","s4"].forEach((sid, idx) => {
        const el = $(sid);
        if(!el) return;
        el.classList.toggle("on", idx + 1 === stepNum);
      });
    }

    function htmlEscape(str){
      return (str || "").replace(/[&<>"']/g, (m) => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
      }[m]));
    }

    async function apiGet(path){
      const res = await fetch(path, { method: "GET" });
      const text = await res.text();
      let data = null;
      try { data = JSON.parse(text); } catch { data = text; }
      if(!res.ok){
        const detail = (data && data.detail) ? data.detail : text;
        throw new Error(detail || "HTTP error " + res.status);
      }
      return data;
    }

    async function apiPost(path, body){
      const res = await fetch(path, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(body),
      });
      const text = await res.text();
      let data = null;
      try { data = JSON.parse(text); } catch { data = text; }
      if(!res.ok){
        const detail = (data && data.detail) ? data.detail : text;
        throw new Error(detail || "HTTP error " + res.status);
      }
      return data;
    }

    // --- CLIENT FLOW ---
    async function runClient(){
      $("clientCard").style.display = "block";
      $("masterCard").style.display = "none";
      $("accessBadge").textContent = "Клиент";

      if(!masterId){
        setError($("clientError"), "Не передан master_id. Откройте mini app из Telegram кнопки.");
        return;
      }

      clearError($("clientError"));
      clearOk($("clientOk"));

      setStep(1);
      $("clientTitle").textContent = "Запись";

      try{
        const master = await apiGet(`${API}/master/${encodeURIComponent(masterId)}`);
        const services = master.services || {};
        const main = services.main_services || "";
        const add = services.additional_services || "";
        const warranty = services.warranty || "";

        const badge = master.access ? `Доступ: ${master.days_left} дн.` : "Запись закрыта";
        $("accessBadge").textContent = badge;

        // Показываем услуги (просто текст; в БД может быть мультистрока)
        $("clientServices").innerHTML =
          `<b>Услуги:</b><br/>` +
          `<span>${htmlEscape(main).replace(/\n/g,"<br/>")}</span>` +
          (add ? `<br/><b>Доп:</b><br/><span>${htmlEscape(add).replace(/\n/g,"<br/>")}</span>` : "") +
          (warranty ? `<br/><b>Гарантия:</b><br/><span>${htmlEscape(warranty).replace(/\n/g,"<br/>")}</span>` : "");

        if(!master.access){
          hide($("slotsField"));
          hide($("contactField"));
          hide($("dateField"));
          setError($("clientError"), "Запись к этому мастеру временно закрыта (истёк срок подписки).");
          return;
        }

        // Дата по умолчанию: сегодня
        const now = new Date();
        const yyyy = now.getFullYear();
        const mm = String(now.getMonth()+1).padStart(2,"0");
        const dd = String(now.getDate()).padStart(2,"0");
        $("dateInput").value = `${yyyy}-${mm}-${dd}`;
        hide($("slotsField"));
        hide($("contactField"));
      }catch(e){
        setError($("clientError"), e.message || String(e));
      }

      $("dateInput").addEventListener("change", async () => {
        clearError($("clientError"));
        clearOk($("clientOk"));

        const date = $("dateInput").value;
        if(!date) return;

        setStep(2);

        let selected = null;
        try{
          const data = await apiGet(`${API}/master/${encodeURIComponent(masterId)}/slots?date=${encodeURIComponent(date)}`);
          const slots = data.slots || [];
          $("slotsGrid").innerHTML = "";

          if(slots.length === 0){
            hide($("slotsField"));
            hide($("contactField"));
            setError($("clientError"), "На эту дату мест больше нет.");
            return;
          }

          hide($("contactField"));
          show($("slotsField"));
          setStep(3);

          // Выбранный слот
          slots.forEach((s, idx) => {
            const btn = document.createElement("div");
            btn.className = "pill";
            btn.setAttribute("role","button");
            btn.textContent = s.time;
            btn.addEventListener("click", () => {
              selected = s;
              // визуально выделим выбранный
              [...$("slotsGrid").children].forEach(c => c.setAttribute("aria-selected","false"));
              btn.setAttribute("aria-selected","true");

              hide($("contactField"));
              setStep(4);
              show($("contactField"));
            });
            if(idx === 0){
              btn.setAttribute("aria-selected","false");
            }
            $("slotsGrid").appendChild(btn);
          });

          // Авто-выбор первого слота, чтобы быстрее
          const first = slots[0];
          selected = first;
          // найти первую pill и выделить
          const firstBtn = $("slotsGrid").children[0];
          if(firstBtn){
            [...$("slotsGrid").children].forEach(c => c.setAttribute("aria-selected","false"));
            firstBtn.setAttribute("aria-selected","true");
            show($("contactField"));
            hide($("clientOk"));
          }
        }catch(e){
          setError($("clientError"), e.message || String(e));
        }

        // store selected in closure variable above
        // We'll re-read selected by using click handler above; book will rely on selectedSlot variable.
        window.__selectedSlotForClient = selected;
      });

      // local selected slot
      $("bookBtn").addEventListener("click", async () => {
        clearError($("clientError"));
        clearOk($("clientOk"));

        const selected = window.__selectedSlotForClient;
        const date = $("dateInput").value;
        if(!selected){
          return setError($("clientError"), "Выберите время.");
        }
        const name = ($("nameInput").value || "").trim();
        const phone = ($("phoneInput").value || "").trim();
        if(!name){
          return setError($("clientError"), "Введите имя и фамилию.");
        }
        if(!phone){
          return setError($("clientError"), "Введите телефон.");
        }

        // UI disable
        $("bookBtn").disabled = true;
        $("bookBtn").textContent = "Пожалуйста, подождите...";

        try{
          await apiPost(`${API}/book`, {
            initData: tg.initData,
            master_id: parseInt(masterId, 10),
            slot_id: selected.slot_id,
            date,
            time: selected.time,
            name,
            phone,
          });
          setOk($("clientOk"), `✅ Запись подтверждена!\nДата: ${date}\nВремя: ${selected.time}`);
        }catch(e){
          setError($("clientError"), e.message || String(e));
        }finally{
          $("bookBtn").disabled = false;
          $("bookBtn").textContent = "Подтвердить запись";
        }
      });

      $("cancelBtn").addEventListener("click", async () => {
        clearError($("clientError"));
        clearOk($("clientOk"));
        $("cancelBtn").disabled = true;
        try{
          const res = await apiPost(`${API}/cancel`, { initData: tg.initData });
          setOk($("clientOk"), "✅ Запись отменена.");
          window.__selectedSlotForClient = null;
          hide($("slotsField"));
          hide($("contactField"));
        }catch(e){
          setError($("clientError"), e.message || String(e));
        }finally{
          $("cancelBtn").disabled = false;
        }
      });
    }

    // --- MASTER FLOW ---
    async function runMaster(){
      $("masterCard").style.display = "block";
      $("clientCard").style.display = "none";
      $("accessBadge").textContent = "Мастер";

      clearError($("masterError"));
      clearOk($("masterOk"));

      try{
        const me = await apiGet(`${API}/master/me?initData=${encodeURIComponent(tg.initData)}`);
        const accessText = me.access ? `Доступ: ${me.days_left} дн.` : "Доступ закрыт";
        $("masterSub").textContent = accessText;

        const s = me.services || {};
        $("mainServices").value = s.main_services || "";
        $("additionalServices").value = s.additional_services || "";
        $("warranty").value = s.warranty || "";
        $("portfolioLink").value = me.portfolio_link || "";

        // date default
        const now = new Date();
        const yyyy = now.getFullYear();
        const mm = String(now.getMonth()+1).padStart(2,"0");
        const dd = String(now.getDate()).padStart(2,"0");
        $("masterDateInput").value = `${yyyy}-${mm}-${dd}`;

        await loadMasterSlots();
        await loadMasterStats();

        const disabled = !me.access;
        // при отсутствии доступа — отключаем действия
        $("saveServicesBtn").disabled = disabled;
        $("autoFillBtn").disabled = disabled;
        $("clearDayBtn").disabled = disabled;
      }catch(e){
        setError($("masterError"), e.message || String(e));
      }

      $("masterDateInput").addEventListener("change", async () => {
        await loadMasterSlots();
      });

      $("saveServicesBtn").addEventListener("click", async () => {
        clearError($("masterError"));
        clearOk($("masterOk"));
        $("saveServicesBtn").disabled = true;
        $("saveServicesBtn").textContent = "Сохраняем...";
        try{
          await apiPost(`${API}/master/services`, {
            initData: tg.initData,
            main_services: $("mainServices").value,
            additional_services: $("additionalServices").value,
            warranty: $("warranty").value,
          });
          await apiPost(`${API}/master/portfolio`, {
            initData: tg.initData,
            portfolio_link: $("portfolioLink").value,
          });
          setOk($("masterOk"), "✅ Сохранено!");
          await loadMasterSlots();
          await loadMasterStats();
        }catch(e){
          setError($("masterError"), e.message || String(e));
        }finally{
          $("saveServicesBtn").disabled = false;
          $("saveServicesBtn").textContent = "Сохранить";
        }
      });

      $("autoFillBtn").addEventListener("click", async () => {
        clearError($("masterError"));
        clearOk($("masterOk"));
        try{
          await apiPost(`${API}/master/slots/auto-fill`, {
            initData: tg.initData,
            date: $("masterDateInput").value,
          });
          setOk($("masterOk"), "Готово: слоты добавлены.");
          await loadMasterSlots();
        }catch(e){
          setError($("masterError"), e.message || String(e));
        }
      });

      $("clearDayBtn").addEventListener("click", async () => {
        clearError($("masterError"));
        clearOk($("masterOk"));
        try{
          await apiPost(`${API}/master/slots/clear`, {
            initData: tg.initData,
            date: $("masterDateInput").value,
          });
          setOk($("masterOk"), "День очищен (только свободные слоты).");
          await loadMasterSlots();
        }catch(e){
          setError($("masterError"), e.message || String(e));
        }
      });

      async function loadMasterSlots(){
        clearError($("masterError"));
        $("masterSlotsList").textContent = "Загрузка...";
        try{
          const date = $("masterDateInput").value;
          const res = await apiGet(`${API}/master/slots?date=${encodeURIComponent(date)}&initData=${encodeURIComponent(tg.initData)}`);
          const slots = res.slots || [];
          if(slots.length === 0){
            $("masterSlotsList").textContent = "Пока слотов нет на эту дату.";
            return;
          }
          $("masterSlotsList").innerHTML = slots
            .map(s => `${s.time} : ${s.is_booked ? "Занято" : "Свободно"}`)
            .join("<br/>");
        }catch(e){
          setError($("masterError"), e.message || String(e));
        }
      }

      async function loadMasterStats(){
        try{
          const res = await apiGet(`${API}/master/stats?initData=${encodeURIComponent(tg.initData)}`);
          $("masterStats").innerHTML =
            `Всего клиентов: <b>${res.total}</b><br/>` +
            `Активных записей: <b>${res.active}</b><br/>` +
            `⭐ Рейтинг: <b>${res.rating}</b>`;
        }catch(e){
          // не критично
          $("masterStats").textContent = "Не удалось загрузить статистику.";
        }
      }
    }

    if(role === "master"){
      runMaster();
    }else{
      runClient();
    }
  </script>
</body>
</html>
